# Linter
[tool.ruff]
# Maximum line length
line-length = 88

# Python version
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

# Automated Tasks
[tool.poe.tasks]
format = "ruff format ."
lint = "ruff check ."
lint_fix = "ruff check . --fix"
run_lilian_etl = "python -m data_engineering.pipelines.run --run-etl"
run_feature_engineering = "python -m data_engineering.pipelines.run --run-feature-engineering"

[tool.poe.tasks.ruff]
sequence = ["format", "lint"]



[dependency-groups]
dev = [
    "bs4>=0.0.2",
    "chromedriver-autoinstaller>=0.6.4",
    "click>=8.4.1",
    "datasets>=5.0.0",
    "html2text>=2025.4.15",
    "langchain>=1.3.2",
    "langchain-community>=0.4.2",
    "langchain-text-splitters>=1.1.2",
    "openai>=2.43.0",
    "poethepoet>=0.46.0",
    "pymongo>=4.17.0",
    "qdrant-client>=1.18.0",
    "ruff>=0.15.15",
    "selenium>=4.44.0",
    "sentence-transformers>=5.5.1",
    "tqdm>=4.67.3",
    "trl>=0.23.0",
]

